<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Lotus</title>
     <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
    <meta name="description" content="Log in to your Lotus account to access your personalized yoga and meditation journey." />
    <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="bg-[var(--bg)] text-[var(--text)]">
    <div class="min-h-screen flex flex-col">
      <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-[var(--surface)]/95 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-6 py-4 md:px-8">
          <a href="../index.html" class="text-logo text-xs sm:text-sm font-semibold uppercase tracking-[0.2em] sm:tracking-[0.3em] text-primary-700 dark:text-primary-200 flex items-center whitespace-nowrap">
            <img src="../assets/images/brand-logo.png" alt="brand-logo" class="w-8 h-8 sm:w-10 sm:h-10 mr-2 sm:mr-3 shrink-0"> Lotus
          </a>
          <div class="flex items-center gap-3">
            <button type="button" data-action="toggle-rtl" class="btn-secondary !py-2.5 !px-3 sm:!px-4 !text-xs inline-flex h-11 items-center">RTL</button>
            <button type="button" data-action="toggle-theme" class="btn-secondary !p-0 h-11 w-11 rounded-full flex items-center justify-center transition-transform hover:rotate-12" aria-label="Toggle theme">
              <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
              <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </button>
          </div>
        </div>
      </header>
      
      <main class="flex-grow flex items-center justify-center py-12 px-6 md:px-8 relative overflow-hidden">
        <!-- Background decorative elements -->
        <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-96 h-96 bg-primary-200/20 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/2 w-96 h-96 bg-accent-200/20 blur-[100px] rounded-full"></div>

        <div class="max-w-5xl w-full grid md:grid-cols-2 gap-0 overflow-hidden rounded-[40px] border border-slate-200/60 bg-[var(--surface)] shadow-soft dark:border-slate-800/60">
          <!-- Left side: Image -->
          <div class=" md:block relative overflow-hidden group">
            <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=1200&q=80" alt="Yoga practice" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110" loading="eager">
            <div class="absolute inset-0 bg-gradient-to-t from-primary-900/60 via-transparent to-transparent"></div>
            <div class="absolute bottom-10 left-10 right-10">
              <p class="text-white text-2xl font-light leading-relaxed">
                "Yoga is not about self-improvement, it's about <span class="font-semibold italic">self-acceptance</span>."
              </p>
              <p class="text-primary-200 mt-4 text-sm font-medium tracking-widest uppercase">— Lotus Wisdom</p>
            </div>
          </div>

          <!-- Right side: Form -->
          <div class="p-8 md:p-12 lg:p-16 flex flex-col justify-center">
            <div class="mb-10">
              <h1 class="text-3xl font-semibold tracking-tight text-slate-900 dark:text-white">Welcome Back</h1>
              <p class="mt-2 text-slate-500 dark:text-slate-400">Continue your journey to mindfulness.</p>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4 mb-8">
              <button class="flex items-center justify-center gap-3 px-4 py-3 rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all dark:border-slate-700 dark:hover:bg-slate-800">
                <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
                <span class="text-sm font-medium">Google</span>
              </button>
              <button class="flex items-center justify-center gap-3 px-4 py-3 rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all dark:border-slate-700 dark:hover:bg-slate-800">
                <svg class="w-5 h-5 dark:fill-white fill-slate-900" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                <span class="text-sm font-medium">Apple</span>
              </button>
            </div>

            <div class="relative mb-8 text-center">
              <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-slate-800"></div></div>
              <span class="relative bg-[var(--surface)] px-4 text-xs font-semibold uppercase tracking-widest text-slate-400">Or email</span>
            </div>

            <form class="space-y-6">
              <div class="space-y-2">
                <label for="email" class="text-sm font-semibold tracking-wide text-slate-700 dark:text-slate-300">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 transition-all outline-none dark:bg-slate-900/50 dark:border-slate-700 dark:focus:bg-slate-900" required>
              </div>

              <div class="space-y-2">
                <div class="flex items-center justify-between">
                  <label for="password" class="text-sm font-semibold tracking-wide text-slate-700 dark:text-slate-300">Password</label>
                 </div>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 transition-all outline-none dark:bg-slate-900/50 dark:border-slate-700 dark:focus:bg-slate-900" required>
              </div>

              <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                <input type="checkbox" id="remember" class="w-5 h-5 rounded border-slate-300 text-primary-600 focus:ring-primary-500">
                <label for="remember" class="text-sm text-slate-600 dark:text-slate-400">Remember me</label> 
                </div>
                <a href="#" class="text-xs font-semibold text-primary-600 hover:text-primary-700">Forgot Password?</a>
              </div>

              <button type="submit" class="btn-primary w-full !py-4 text-base font-semibold shadow-xl shadow-primary-500/20">Sign In</button>
            </form>

            <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
              Don't have an account? <a href="register.html" class="font-semibold text-primary-600 hover:text-primary-700">Join Lotus</a>
            </p>
          </div>
        </div>
      </main>
    </div>
    <script src="../assets/js/site.js"></script>
  </body>
</html>
