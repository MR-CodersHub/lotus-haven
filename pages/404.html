<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 • Lotus Haven</title>
     <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body
      <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-[var(--surface)]/95 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-6 py-4 md:px-8">
          <a href="../" class="text-logo text-sm font-semibold uppercase tracking-[0.3em] text-primary-700 dark:text-primary-200 flex items-center"><img src="../assets/images/brand-logo.png" alt="brand-logo" class="w-12 h-12 mr-8"> Lotus Haven</a>
    
          <div class="flex items-center gap-3">
            <button type="button" data-action="toggle-rtl" class="btn-secondary hidden md:inline-flex">RTL</button>
            <button type="button" data-action="toggle-theme" class="btn-secondary">Mode</button>
            <div class="relative">
              <button type="button" data-action="profile-menu-toggle" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-300 bg-white text-slate-700 shadow-soft transition hover:border-primary-500 hover:bg-primary-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100" aria-label="Profile menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 22C4 17.5817 7.58172 14 12 14C16.4183 14 20 17.5817 20 22" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div data-profile-menu class="absolute right-0 z-50 mt-3 hidden min-w-[220px] overflow-hidden rounded-3xl border border-slate-200 bg-[var(--surface)] text-left shadow-soft dark:border-slate-700 dark:bg-slate-900">
                <a href="login.html" class="block px-4 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Login / Signup</a>
                <a href="admin-dashboard.html" class="block px-4 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Admin dashboard</a>
                <a href="dashboard.html" class="block px-4 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">User dashboard</a>
              </div>
            </div>
          </div>
        </div>
      </header>
    <main class="grid min-h-screen place-items-center px-6 py-12 text-center md:px-8">
      <div class="max-w-2xl rounded-[40px] border border-[var(--border)] bg-[var(--surface)] p-10 shadow-soft">
        <p class="text-sm uppercase tracking-[0.35em] text-primary-700 dark:text-primary-200">Page not found</p>
        <h1 class="mt-4 text-5xl font-semibold tracking-tight text-slate-900 dark:text-white">404</h1>
        <p class="mt-6 text-base leading-8 text-slate-600 dark:text-slate-300">The page you’re looking for doesn’t exist yet. Return home or explore our current services.</p>
        <a href="../index.html" class="mt-8 inline-flex btn-primary">Back to home</a>
      </div>
    
    </main>
    <script src="../assets/js/site.js"></script>
  </body>
</html>
